name: Generate GitHub Stats

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      # ── Stats Card ──────────────────────────────────────────────
      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: "username=${{ github.repository_owner }}&show_icons=true&hide_border=true&bg_color=0d1117&title_color=6EE7B7&icon_color=6EE7B7&text_color=c9d1d9&count_private=true"
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Top Languages Card ───────────────────────────────────────
      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: "username=${{ github.repository_owner }}&layout=compact&hide_border=true&bg_color=0d1117&title_color=6EE7B7&text_color=c9d1d9"
          path: profile/langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Streak Card ──────────────────────────────────────────────
      - name: Generate streak card (dark)
        uses: be-next/github-streak-stats-action@v1
        with:
          username: ${{ github.repository_owner }}
          token: ${{ secrets.GITHUB_TOKEN }}
          output-path: profile/streak.svg
          theme: dark
          hide-border: true

      # ── Snake Animation ──────────────────────────────────────────
      - name: Generate snake animation
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            profile/snake.svg
            profile/snake-dark.svg?palette=github-dark

      # ── Commit tudo ──────────────────────────────────────────────
      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile/
          git commit -m "chore: update profile cards [skip ci]" || echo "Nothing to commit"
          git push
